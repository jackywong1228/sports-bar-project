  <line x1="24" y1="8" x2="24" y2="14" stroke="#1A5D3A" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-left spoke -->
  <line x1="10.1" y1="32" x2="15.3" y2="29" stroke="#1A5D3A" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-right spoke -->
  <line x1="37.9" y1="32" x2="32.7" y2="29" stroke="#1A5D3A" stroke-width="2" stroke-linecap="round"/>
  <!-- Center hub -->
